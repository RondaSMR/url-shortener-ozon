name: URL-shortener tests

on:
  push:
    branches: [ main, origin ]
  pull_request:
    branches: [ main, origin ]

jobs:
  test-memory:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.24.x"

      - name: Run memory test
        run: go test -v ./internal/domain/usecase/memory/...

  test-postgres:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: testuser
          POSTGRES_PASSWORD: testpass
          POSTGRES_DB: testdb
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U testuser"
          --health-interval=5s
          --health-timeout=5s
          --health-retries=5

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.24.x"

      - name: Init database schema
        run: |
          PGPASSWORD=testpass psql -h localhost -U testuser -d testdb -f urls.sql

      - name: Run postgres tests
        env:
          STORAGE_MODE: db
          STORAGE_HOST: localhost
          STORAGE_PORT: 5432
          STORAGE_PG_USER: testuser
          STORAGE_PASS: testpass
          STORAGE_DB: testdb
        run: |
          go test -v ./internal/domain/usecase/postgres/...